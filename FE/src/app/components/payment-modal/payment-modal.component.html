<!-- Backdrop -->
<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6" aria-labelledby="modal-title"
    role="dialog" aria-modal="true">
    <div class="fixed inset-0 bg-gray-900/75 backdrop-blur-sm transition-opacity" (click)="closeModal()"></div>

    <!-- Modal Panel -->
    <div
        class="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all flex flex-col max-h-full">

        <!-- Header -->
        <div class="px-6 py-5 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
            <h3 class="text-xl font-bold text-gray-900" id="modal-title">Complete Payment</h3>
            <button (click)="closeModal()" [disabled]="isProcessing() || isSuccess()"
                class="text-gray-400 hover:text-gray-500 transition-colors disabled:opacity-50">
                <span class="sr-only">Close</span>
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Scrollable Body -->
        <div class="px-6 py-6 overflow-y-auto">
            <!-- Amount Summary -->
            <div class="bg-blue-50 rounded-xl p-4 mb-6 flex justify-between items-center border border-blue-100">
                <span class="text-sm font-medium text-blue-900">Total to pay</span>
                <span class="text-2xl font-black text-blue-700">₹{{ amount | number }}</span>
            </div>

            <!-- Success State -->
            <div *ngIf="isSuccess()" class="flex flex-col items-center justify-center py-8">
                <div
                    class="h-20 w-20 bg-green-100 rounded-full flex items-center justify-center mb-4 text-green-500 animate-bounce">
                    <svg class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h4 class="text-2xl font-bold text-gray-900 mb-2">Payment Successful!</h4>
                <p class="text-gray-500 text-center">Your booking is being confirmed...</p>
            </div>

            <!-- Payment Form -->
            <div *ngIf="!isSuccess()">
                <!-- Method Tabs -->
                <div class="flex space-x-2 mb-6 p-1 bg-gray-100 rounded-lg">
                    <button (click)="setMethod('card')"
                        [ngClass]="paymentMethod() === 'card' ? 'bg-white shadow relative text-gray-900' : 'text-gray-500 hover:text-gray-700'"
                        class="flex-1 py-2 px-4 text-sm font-bold rounded-md transition-all flex items-center justify-center">
                        <svg class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z">
                            </path>
                        </svg>
                        Credit Card
                    </button>
                    <button (click)="setMethod('upi')"
                        [ngClass]="paymentMethod() === 'upi' ? 'bg-white shadow relative text-gray-900' : 'text-gray-500 hover:text-gray-700'"
                        class="flex-1 py-2 px-4 text-sm font-bold rounded-md transition-all flex items-center justify-center">
                        <svg class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                        </svg>
                        UPI
                    </button>
                </div>

                <!-- Card Details Form -->
                <div *ngIf="paymentMethod() === 'card'" class="space-y-4 animate-fade-in">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase tracking-wide mb-1">Cardholder
                            Name</label>
                        <input type="text" [ngModel]="cardName()" (ngModelChange)="cardName.set($event)"
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white transition-colors text-gray-900"
                            placeholder="Name on card">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase tracking-wide mb-1">Card
                            Number</label>
                        <div class="relative">
                            <input type="text" [ngModel]="cardNumber()" (ngModelChange)="cardNumber.set($event)"
                                maxlength="16"
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white transition-colors text-gray-900 pl-12"
                                placeholder="0000 0000 0000 0000">
                            <svg class="w-6 h-6 text-gray-400 absolute left-3 top-3" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z">
                                </path>
                            </svg>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase tracking-wide mb-1">Expiry
                                Date</label>
                            <input type="text" [ngModel]="expiry()" (ngModelChange)="expiry.set($event)" maxlength="5"
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white transition-colors text-gray-900"
                                placeholder="MM/YY">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase tracking-wide mb-1">CVC /
                                CVV</label>
                            <div class="relative">
                                <input type="text" [ngModel]="cvc()" (ngModelChange)="cvc.set($event)" maxlength="3"
                                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white transition-colors text-gray-900"
                                    placeholder="123">
                                <svg class="w-4 h-4 text-gray-400 absolute right-3 top-3.5" fill="none"
                                    viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- UPI Details Form -->
                <div *ngIf="paymentMethod() === 'upi'" class="space-y-4 animate-fade-in">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase tracking-wide mb-1">Virtual
                            Payment Address (UPI ID)</label>
                        <input type="text" [ngModel]="upiId()" (ngModelChange)="upiId.set($event)"
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white transition-colors text-gray-900"
                            placeholder="yourname@bank">
                        <p class="mt-2 text-xs text-gray-500">A payment request will be sent to your UPI app.</p>
                    </div>

                    <!-- Decorative Mock Apps -->
                    <div class="pt-4 mt-4 border-t border-gray-100">
                        <p class="text-xs text-center text-gray-400 font-medium mb-3">ACCEPTED APPS</p>
                        <div class="flex justify-center space-x-4 grayscale opacity-50">
                            <div
                                class="w-8 h-8 bg-gray-300 rounded-full flex items-center justify-center font-bold text-xs text-white">
                                G</div>
                            <div
                                class="w-8 h-8 bg-gray-300 rounded-full flex items-center justify-center font-bold text-xs text-white">
                                P</div>
                            <div
                                class="w-8 h-8 bg-gray-300 rounded-full flex items-center justify-center font-bold text-xs text-white">
                                B</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer / Action -->
        <div class="px-6 py-5 bg-gray-50 border-t border-gray-100">
            <button *ngIf="!isSuccess()" (click)="processPayment()" [disabled]="isProcessing()"
                class="w-full flex items-center justify-center px-6 py-4 border border-transparent rounded-xl shadow-lg text-base font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all transform active:scale-[0.98] disabled:opacity-75 disabled:cursor-not-allowed">

                <ng-container *ngIf="!isProcessing()">
                    <svg class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                    Pay ₹{{ amount | number }}
                </ng-container>

                <ng-container *ngIf="isProcessing()">
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg"
                        fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    Processing securely...
                </ng-container>
            </button>

            <div class="mt-4 flex items-center justify-center text-xs text-gray-500 font-medium">
                <svg class="h-4 w-4 mr-1 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
                Secure 256-bit SSL Encryption
            </div>
        </div>
    </div>
</div>
