<nav class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex">
                <div class="flex-shrink-0 flex items-center">
                    <a routerLink="/" class="text-xl font-bold text-blue-600">CarRental</a>
                </div>
                <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                    <a routerLink="/"
                        class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Home</a>
                    <a routerLink="/" fragment="featured"
                        class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Browse
                        Cars</a>
                    <a routerLink="/my-bookings"
                        class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">My
                        Bookings</a>
                    <a routerLink="/admin"
                        class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Admin</a>
                </div>
            </div>
            <div class="hidden sm:ml-6 sm:flex sm:items-center">
                <ng-container *ngIf="authService.currentUser() as user; else guest">
                    <span class="text-gray-700 mr-4">Hello, {{ user.email }}</span>
                    <button (click)="authService.logout()"
                        class="text-gray-500 hover:text-gray-700 px-3 py-2 rounded-md text-sm font-medium">Logout</button>
                </ng-container>
                <ng-template #guest>
                    <a routerLink="/login"
                        class="text-gray-500 hover:text-gray-700 px-3 py-2 rounded-md text-sm font-medium">Login</a>
                    <a routerLink="/register"
                        class="bg-blue-600 text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-blue-700 ml-3">Register</a>
                    <a *ngIf="!authService.currentUser() || authService.isAdmin()" routerLink="/admin-login"
                        class="text-indigo-600 hover:text-indigo-800 px-3 py-2 rounded-md text-sm font-medium ml-3">Admin
                        Login</a>
                </ng-template>

            </div>
            <div class="-mr-2 flex items-center sm:hidden">
                <button (click)="toggleMenu()" type="button"
                    class="bg-white inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    <span class="sr-only">Open main menu</span>
                    <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div class="sm:hidden" [class.block]="isMenuOpen" [class.hidden]="!isMenuOpen">
        <div class="pt-2 pb-3 space-y-1">
            <a routerLink="/"
                class="border-transparent text-gray-500 hover:bg-gray-50 hover:border-gray-300 hover:text-gray-700 block pl-3 pr-4 py-2 border-l-4 text-base font-medium">Home</a>
            <a routerLink="/cars"
                class="border-transparent text-gray-500 hover:bg-gray-50 hover:border-gray-300 hover:text-gray-700 block pl-3 pr-4 py-2 border-l-4 text-base font-medium">Browse
                Cars</a>
        </div>
        <div class="pt-4 pb-4 border-t border-gray-200">
            <ng-container *ngIf="authService.currentUser() as user; else mobileGuest">
                <div class="flex items-center px-4">
                    <div class="ml-3">
                        <div class="text-base font-medium text-gray-800">{{ user.email }}</div>
                    </div>
                </div>
                <div class="mt-3 space-y-1">
                    <button (click)="authService.logout()"
                        class="block w-full text-left px-4 py-2 text-base font-medium text-gray-500 hover:text-gray-800 hover:bg-gray-100">Logout</button>
                </div>
            </ng-container>
            <ng-template #mobileGuest>
                <div class="mt-3 space-y-1">
                    <a routerLink="/login"
                        class="block px-4 py-2 text-base font-medium text-gray-500 hover:text-gray-800 hover:bg-gray-100">Login</a>
                    <a routerLink="/register"
                        class="block px-4 py-2 text-base font-medium text-gray-500 hover:text-gray-800 hover:bg-gray-100">Register</a>
                    <a *ngIf="!authService.currentUser() || authService.isAdmin()" routerLink="/admin-login"
                        class="block px-4 py-2 text-base font-medium text-indigo-600 hover:text-indigo-800 hover:bg-indigo-50">Admin
                        Login</a>
                </div>

            </ng-template>
        </div>
    </div>
</nav>
