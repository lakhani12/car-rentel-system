<div class="flex min-h-screen bg-white">
    <!-- Left Section - Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 sm:p-12 lg:p-24 bg-gray-50 lg:order-1 order-2">
        <div class="w-full max-w-md space-y-8">
            <div class="text-center lg:text-left">
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Create Account</h1>
                <p class="mt-2 text-sm text-gray-600">
                    Already have an account?
                    <a routerLink="/login"
                        class="font-semibold text-blue-600 hover:text-blue-500 transition-colors">Sign in here</a>
                </p>
            </div>

            <form class="mt-8 space-y-5" (submit)="handleRegister(); $event.preventDefault()">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700">Full Name</label>
                    <div class="mt-1">
                        <input [ngModel]="name()" (ngModelChange)="name.set($event)" id="name" name="name" type="text"
                            required
                            class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow sm:text-sm"
                            placeholder="John Doe">
                    </div>
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                    <div class="mt-1">
                        <input [ngModel]="email()" (ngModelChange)="email.set($event)" id="email" name="email"
                            type="email" autocomplete="email" required
                            class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow sm:text-sm"
                            placeholder="you@example.com">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <div class="mt-1">
                        <input [ngModel]="password()" (ngModelChange)="password.set($event)" id="password"
                            name="password" type="password" autocomplete="new-password" required
                            class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow sm:text-sm"
                            placeholder="••••••••">
                    </div>
                </div>

                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-gray-700">Confirm
                        Password</label>
                    <div class="mt-1">
                        <input [ngModel]="confirmPassword()" (ngModelChange)="confirmPassword.set($event)"
                            id="confirm-password" name="confirmPassword" type="password" autocomplete="new-password"
                            required
                            class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow sm:text-sm"
                            placeholder="••••••••">
                    </div>
                </div>

                <div *ngIf="errorMessage()" class="p-4 bg-red-50 border-l-4 border-red-500 rounded-r-md">
                    <p class="text-sm text-red-700">{{ errorMessage() }}</p>
                </div>

                <div class="pt-2">
                    <button type="submit"
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-md text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-transform transform active:scale-[0.98]">
                        Sign Up
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Right Section - Image/Branding -->
    <div class="hidden lg:flex lg:w-1/2 relative bg-gray-900 lg:order-2 order-1">
        <img class="absolute inset-0 w-full h-full object-cover opacity-80"
            src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&q=80"
            alt="Luxury Car Interior" />
        <div class="absolute inset-0 bg-gradient-to-t from-gray-900/90 via-gray-900/40 to-transparent"></div>
        <div class="absolute bottom-0 right-0 p-12 text-white text-right">
            <h2 class="text-4xl font-bold mb-4">Start Your Journey.</h2>
            <p class="text-lg text-gray-300 text-right ms-auto max-w-md">Join our exclusive club today and get access to
                the world's most sought-after vehicles.</p>
        </div>
    </div>
</div>
