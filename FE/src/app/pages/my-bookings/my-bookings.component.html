<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <h1 class="text-3xl font-bold text-gray-900 mb-8">My Bookings</h1>

    <ng-container *ngIf="bookingsWithCarInfo$ | async as bookings; else loading">
        <div *ngIf="bookings.length > 0; else noBookings" class="space-y-4">
            <div *ngFor="let booking of bookings" class="bg-white p-6 rounded-lg shadow-md border border-gray-200">
                <div class="flex items-center space-x-6">
                    <img [src]="booking.carImage" class="w-24 h-24 object-cover rounded"
                        onerror="this.src='https://via.placeholder.com/150'">
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-xl font-bold text-gray-900">{{ booking.carName }}</h3>
                                <span
                                    class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium uppercase tracking-wide mt-1"
                                    [ngClass]="{
                                'bg-yellow-100 text-yellow-800': booking.status === 'pending',
                                'bg-green-100 text-green-800': booking.status === 'confirmed',
                                'bg-red-100 text-red-800': booking.status === 'cancelled'
                            }">
                                    {{ booking.status }}
                                </span>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-bold text-blue-600">₹{{ booking.totalPrice }}</div>
                            </div>
                        </div>

                        <div class="mt-4 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
                            <div class="grid grid-cols-2 gap-4 text-sm text-gray-600">
                                <div>
                                    <span class="block font-medium text-gray-500">From</span>
                                    {{ booking.startDate | date }}
                                </div>
                                <div>
                                    <span class="block font-medium text-gray-500">To</span>
                                    {{ booking.endDate | date }}
                                </div>
                            </div>

                            <!-- Cancel Button -->
                            <div *ngIf="booking.status !== 'cancelled'">
                                <button (click)="cancelBooking(booking.id)"
                                    class="inline-flex items-center px-4 py-2 border border-red-300 shadow-sm text-sm font-medium rounded-md text-red-700 bg-white hover:bg-red-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-colors">
                                    Cancel Booking
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <ng-template #noBookings>
            <div class="text-center py-20 bg-gray-50 rounded-lg">
                <p class="text-xl text-gray-500">You haven't booked any cars yet.</p>
                <a routerLink="/" class="mt-4 inline-block text-blue-600 font-medium hover:underline">Browse Cars</a>
            </div>
        </ng-template>
    </ng-container>

    <ng-template #loading>
        <div class="text-center py-10">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto"></div>
            <p class="mt-2 text-gray-500">Loading your bookings...</p>
        </div>
    </ng-template>
</div>
